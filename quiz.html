<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codemaster Quiz</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.box{background:#1e293b;padding:30px;border-radius:15px;max-width:600px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
h2{color:#38bdf8;text-align:center}
.q{font-size:18px;margin-bottom:20px}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#334155;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;transition:0.3s}
.btn:hover{background:#475569}
.btn.correct{background:#22c55e!important}
.btn.wrong{background:#ef4444!important}
.score{text-align:center;font-size:20px;margin-top:20px;color:#fbbf24}
#nextBtn{background:#3b82f6;margin-top:15px;display:none}
</style>
</head>
<body>
<div class="box">
<h2>🧠 Codemaster Quiz</h2>
<div id="quiz">
<div class="q" id="question">Loading...</div>
<div id="options"></div>
<button class="btn" id="nextBtn" onclick="nextQ()">Next ➡️</button>
</div>
<div class="score" id="score"></div>
</div>

<script>
const questions = [
{
q: "HTML ka full form kya hai?",
options: ["Hyper Text Markup Language", "High Tech Machine Language", "Home Tool Markup Language", "Hyperlink Text Machine Language"],
answer: 0
},
{
q: "CSS ka use kis liye hota hai?",
options: ["Database ke liye", "Website design ke liye", "Server ke liye", "Logic ke liye"],
answer: 1
},
{
q: "JavaScript kya hai?",
options: ["Coffee ka type", "Programming language", "Markup language", "Database"],
answer: 1
},
// YAHAN TU APNE 97 QUESTIONS AUR ADD KAR DE
// Format same rakhna: q:"sawal", options:[4 options], answer: sahi wala ka number 0 se 3
];

let current = 0;
let score = 0;
let shuffled = [];

// Shuffle function
function shuffleArray(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

function startQuiz() {
shuffled = shuffleArray([...questions]);
loadQ();
}

function loadQ() {
if(current >= shuffled.length) {
document.getElementById('quiz').innerHTML = `<div class="score">🎉 Quiz Khatam! Tera Score: ${score}/${shuffled.length}</div>`;
return;
}
let q = shuffled[current];
document.getElementById('question').innerText = `Q${current+1}. ${q.q}`;
let opts = document.getElementById('options');
opts.innerHTML = '';
q.options.forEach((opt, i) => {
let btn = document.createElement('button');
btn.className = 'btn';
btn.innerText = opt;
btn.onclick = () => checkAns(i, btn);
opts.appendChild(btn);
});
document.getElementById('nextBtn').style.display = 'none';
}

function checkAns(i, btn) {
let q = shuffled[current];
let allBtns = document.querySelectorAll('#options.btn');
allBtns.forEach(b => b.onclick = null);
if(i == q.answer) {
btn.classList.add('correct');
score++;
} else {
btn.classList.add('wrong');
allBtns[q.answer].classList.add('correct');
}
document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() {
current++;
loadQ();
}
</script>
</body>
</html>
