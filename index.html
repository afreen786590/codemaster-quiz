<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Marks Quiz</title>
<style>
body{font-family:'Segoe UI',Arial;background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.quiz-box{background:#1e293b;padding:35px;border-radius:16px;max-width:650px;width:100%}
h2{color:#38bdf8;font-size:22px;margin-bottom:25px}
#qno{color:#94a3b8;font-size:14px;margin-bottom:15px;font-weight:600}
.option{background:#334155;padding:16px;margin:12px 0;border-radius:10px;cursor:pointer;transition:0.2s}
.option:hover{background:#475569;border:2px solid #38bdf8}
.next-btn{background:#38bdf8;color:#0f172a;border:none;padding:14px 30px;border-radius:10px;cursor:pointer;margin-top:20px;font-size:16px;font-weight:600;width:100%}
.next-btn:disabled{background:#475569;color:#64748b}
.score{font-size:28px;color:#4ade80;text-align:center;margin-top:20px;font-weight:700}
.restart-btn{background:#4ade80;color:#0f172a;border:none;padding:14px 30px;border-radius:10px;cursor:pointer;margin-top:15px;font-size:16px;font-weight:600;width:100%}
</style>
</head>
<body>
<div class="quiz-box">
<div id="qno"></div>
<h2 id="question"></h2>
<div id="options"></div>
<button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>Next Question →</button>
<div id="result" class="score"></div>
<button class="restart-btn" id="restartBtn" onclick="restart()" style="display:none">🔄 Again Quiz De</button>
</div>

<script>
const questions = [
{q:"JavaScript kya hai?",options:["Programming Language","Operating System","Browser","Database"],answer:0},
{q:"HTML ka full form kya hai?",options:["Hyper Text Markup Language","High Tech Machine Language","Home Tool Markup Language","Hyperlink Text Mark Language"],answer:0},
{q:"CSS kis liye use hota hai?",options:["Webpage Styling","Database Management","Server Logic","None"],answer:0},
{q:"var, let, const me main difference?",options:["Scope","Speed","Syntax","Color"],answer:0},
{q:"Array kaise declare karte hain?",options:["[]","{}","()","<>"],answer:0},
{q:"What is closure?",options:["Function + outer scope","Loop","Variable","None"],answer:0},
{q:"== vs === difference?",options:["Type checking","Speed","Syntax","None"],answer:0},
{q:"What is hoisting?",options:["Variables moved to top","Error","Loop","None"],answer:0},
{q:"let vs var?",options:["Block scope","Speed","Color","None"],answer:0},
{q:"What is REST API?",options:["Representational State Transfer","Random Entry","Remote Tool","None"],answer:0}
];

let current = 0, score = 0, quizQuestions = [], selected = false;

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function startQuiz(){
score = 0; current = 0; selected = false;
document.getElementById('result').innerHTML = '';
document.getElementById('restartBtn').style.display = 'none';
document.getElementById('nextBtn').style.display = 'block';
quizQuestions = shuffle([...questions]).slice(0, 10); // 10 me se 10 pick karega abhi
loadQ();
}

function loadQ(){
if(current >= quizQuestions.length){
document.getElementById('result').innerHTML = `🎉 Quiz Khatam!<br>Score: ${score}/10`;
document.getElementById('question').innerHTML = '';
document.getElementById('options').innerHTML = '';
document.getElementById('nextBtn').style.display = 'none';
document.getElementById('qno').innerHTML = '';
document.getElementById('restartBtn').style.display = 'block';
return;
}
selected = false;
document.getElementById('nextBtn').disabled = true;
document.getElementById('qno').innerHTML = `Question ${current+1} of 10`;
document.getElementById('question').innerHTML = quizQuestions[current].q;
document.getElementById('options').innerHTML = '';
quizQuestions[current].options.forEach((opt,i)=>{
let div = document.createElement('div');
div.className = 'option';
div.innerHTML = `${i+1}. ${opt}`;
div.onclick = ()=>select(i,div);
document.getElementById('options').appendChild(div);
});
}

function select(i,div){
if(selected) return;
selected = true;
document.querySelectorAll('.option').forEach((o,j)=>{
o.style.pointerEvents = 'none';
if(j == quizQuestions[current].answer) o.style.background = '#22c55e';
else if(j == i) o.style.background = '#ef4444';
});
if(i == quizQuestions[current].answer) score++;
document.getElementById('nextBtn').disabled = false;
}

function nextQ(){current++;loadQ()}
function restart(){startQuiz()}
startQuiz();
</script>
</body>
</html>
